services:
  # Frontend React App - Static Site
  - type: web
    name: academie-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    
    envVars:
      - key: NODE_ENV
        value: production
      # URL du backend déployé
      - key: VITE_API_URL
        value: https://academie-back.onrender.com
